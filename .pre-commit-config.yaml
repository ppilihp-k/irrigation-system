repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v2.3.0
  hooks:
    - id: check-yaml
    - id: end-of-file-fixer
    - id: trailing-whitespace
- repo: https://github.com/psf/black
  rev: 22.10.0
  hooks:
    - id: black
      args: ["--line-length", "120"]
- repo: https://github.com/pycqa/isort
  rev: 6.1.0
  hooks:
    - id: isort
      name: isort (python)
      args: ["--profile", "black", "--filter-files"]
- repo: local
  hooks:
    - id: pylint
      name: pylint
      entry: pylint
      language: system
      types: [python]
      args: ["--max-line-length", "120", "--disable=C0114,C0115,C0116,W0107"]
- repo: https://github.com/pre-commit/mirrors-mypy
  rev: 'v2.0.0'
  hooks:
  - id: mypy
    types: [python]
    args: ["--strict","--check-untyped-defs","--ignore-missing-imports"]
exclude: "^control_unit/control_unit/components/communication/umqtt_client/_umqtt/.*\\.py"
